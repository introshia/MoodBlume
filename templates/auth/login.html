{% extends 'pages/base.html' %}


{% block title %}Log In{% endblock %}

{% block content %}
<div class="page-centered-wrapper">
    <div class="auth-card">
        <h1 class="brutal-title">Welcome Back</h1>
        <p class="subtitle">Open your almanac and continue the journey.</p>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <input type="text" name="username" class="form-control" placeholder="Your Pen Name (Username)" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn-brutal">Unlock Almanac</button>
        </form>

        <div class="auth-links">
            <p>Don't have an almanac yet? <a href="{{ url_for('auth.register') }}">Start one here</a></p>
        </div>
    </div>
</div>
{% endblock %}
