<aside class="app-sidebar" id="app-sidebar">
    <div class="sidebar-inner">

        <!-- Top Bar: Workspace + Collapse -->
        <div class="sidebar-top-bar">
            <div class="sidebar-workspace">
                <img src="{{ url_for('static', filename='images/moodblume_logo.png') }}" alt="MoodBlume" class="workspace-icon">
                <span class="workspace-label">MoodBlume</span>
            </div>
            <button class="sidebar-collapse-btn" id="sidebar-close-btn" title="Collapse sidebar" aria-label="Collapse sidebar">
                <i class="ti ti-layout-sidebar-left-collapse"></i>
            </button>
        </div>

        <!-- Main Nav -->
        <div class="sidebar-section">
            <ul class="sidebar-nav-list">
                <li>
                    <a href="{{ url_for('sanctuary') }}" class="sidebar-nav-item {% if request.endpoint == 'sanctuary' %}active{% endif %}">
                        <i class="ti ti-leaf nav-icon"></i>
                        <span>Sanctuary</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('archive') }}" class="sidebar-nav-item {% if request.endpoint == 'archive' %}active{% endif %}">
                        <i class="ti ti-archive nav-icon"></i>
                        <span>Archive</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-divider"></div>

        <!-- Collections Section -->
        <div class="sidebar-section">
            <span class="sidebar-section-label">Collections</span>
            <ul class="sidebar-nav-list" id="sidebar-collections-list">
                {% if user_collections %}
                    {% for c in user_collections %}
                    <li>
                        <a href="{{ url_for('archive') }}?collection={{ c.id }}" class="sidebar-nav-item">
                            <span class="collection-dot" style="background-color: {{ c.cover_color or '#F4E6A6' }};"></span>
                            <span class="collection-name">{{ c.name }}</span>
                        </a>
                    </li>
                    {% endfor %}
                {% else %}
                    <li class="sidebar-empty-hint">No collections yet</li>
                {% endif %}
            </ul>
        </div>

        <!-- Spacer -->
        <div style="flex: 1;"></div>

        <div class="sidebar-divider"></div>

        <!-- Footer -->
        <div class="sidebar-footer">
            <ul class="sidebar-nav-list">
                <li>
                    <button class="sidebar-nav-item" id="sidebar-new-journal-btn">
                        <i class="ti ti-pencil-plus nav-icon"></i>
                        <span>New Entry</span>
                        <span class="nav-shortcut">⌘O</span>
                    </button>
                </li>
                <li>
                    <a href="{{ url_for('profile') }}" class="sidebar-nav-item {% if request.endpoint == 'profile' %}active{% endif %}">
                        <i class="ti ti-user-circle nav-icon"></i>
                        <span>Account</span>
                    </a>
                </li>
                <li>
                    <button class="sidebar-nav-item" id="sidebar-theme-btn">
                        <i class="ti ti-moon nav-icon" id="sidebar-theme-icon"></i>
                        <span id="sidebar-theme-label">Dark Mode</span>
                    </button>
                </li>
                <li>
                    <a href="{{ url_for('logout') }}" class="sidebar-nav-item logout-item">
                        <i class="ti ti-logout nav-icon"></i>
                        <span>Sign out</span>
                    </a>
                </li>
            </ul>
        </div>

    </div>
</aside>

<!-- Button shown when sidebar is collapsed -->
<button class="sidebar-open-btn" id="sidebar-open-btn" title="Open sidebar" aria-label="Open sidebar" style="display: none;">
    <i class="ti ti-layout-sidebar-left-expand"></i>
</button>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Mobile top bar -->
<div class="mobile-top-bar" id="mobile-top-bar">
    <button class="mobile-toggle-btn" id="mobile-sidebar-toggle-btn" aria-label="Toggle menu">
        <i class="ti ti-menu-2"></i>
    </button>
    <a href="{{ url_for('archive') }}" class="mobile-logo">MoodBlume</a>
    <div style="width: 40px;"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // --- Collapse / Expand ---
    const sidebar = document.getElementById('app-sidebar');
    const closeBtn = document.getElementById('sidebar-close-btn');
    const openBtn = document.getElementById('sidebar-open-btn');

    function collapseSidebar() {
        sidebar.classList.add('collapsed');
        if (openBtn) openBtn.style.display = 'flex';
        localStorage.setItem('sidebarCollapsed', '1');
    }

    function expandSidebar() {
        sidebar.classList.remove('collapsed');
        if (openBtn) openBtn.style.display = 'none';
        localStorage.setItem('sidebarCollapsed', '0');
    }

    if (localStorage.getItem('sidebarCollapsed') === '1') {
        collapseSidebar();
    }

    if (closeBtn) closeBtn.addEventListener('click', collapseSidebar);
    if (openBtn) openBtn.addEventListener('click', expandSidebar);

    // --- Mobile Sidebar ---
    const overlay = document.getElementById('sidebar-overlay');
    const mobileToggleBtn = document.getElementById('mobile-sidebar-toggle-btn');

    if (mobileToggleBtn) {
        mobileToggleBtn.addEventListener('click', function () {
            sidebar.classList.add('show');
            overlay.classList.add('show');
        });
    }

    if (overlay) {
        overlay.addEventListener('click', function () {
            sidebar.classList.remove('show');
            overlay.classList.remove('show');
        });
    }

    // --- New Entry ---
    const newJournalBtn = document.getElementById('sidebar-new-journal-btn');

    function handleNewJournal() {
        if (window.location.pathname === '/sanctuary') {
            if (typeof startOpenJournal === 'function') {
                startOpenJournal();
            } else {
                window.location.href = '/sanctuary?open_journal=true';
            }
        } else {
            window.location.href = '/sanctuary?open_journal=true';
        }
    }

    if (newJournalBtn) newJournalBtn.addEventListener('click', handleNewJournal);

    document.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'o') {
            e.preventDefault();
            handleNewJournal();
        }
    });

    // --- Theme Toggle ---
    const themeBtn = document.getElementById('sidebar-theme-btn');
    const themeIcon = document.getElementById('sidebar-theme-icon');
    const themeLabel = document.getElementById('sidebar-theme-label');

    function syncThemeUI() {
        const isDark = document.body.classList.contains('dark-theme');
        if (themeIcon) themeIcon.className = isDark ? 'ti ti-sun nav-icon' : 'ti ti-moon nav-icon';
        if (themeLabel) themeLabel.textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }

    syncThemeUI();

    if (themeBtn) {
        themeBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            syncThemeUI();
        });
    }
});
</script>
