<aside class="app-sidebar" id="app-sidebar">

    <div class="paper-sidebar-note" id="paper-sidebar-note">

        <svg class="paper-clip-svg" viewBox="0 0 38 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M 19,4 Q 34,4 34,20 L 34,76 Q 34,92 19,92 Q 4,92 4,76 L 4,24 Q 4,12 14,10 Q 24,8 24,20 L 24,72 Q 24,80 19,80 Q 14,80 14,72 L 14,22"
                stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 6,26 L 6,76 Q 6,88 19,89" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
            <path d="M 19,5 Q 32,5 32,20" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
        </svg>

        <button class="paper-collapse-btn" id="sidebar-close-btn" title="Collapse sidebar" aria-label="Collapse sidebar">×</button>

        <div class="paper-brand">
            <img src="{{ url_for('static', filename='images/moodblume_logo.png') }}" alt="MoodBlume" class="paper-brand-logo">
            <div class="paper-brand-name">MoodBlume</div>
        </div>

        <nav class="paper-main-nav">
            <ul>
                <li>
                    <a href="{{ url_for('main.sanctuary') }}" class="paper-link {% if request.endpoint == 'main.sanctuary' %}active{% endif %}">
                        <span class="paper-arrow">{% if request.endpoint == 'main.sanctuary' %}→{% else %}&thinsp;{% endif %}</span>Sanctuary
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('main.journal') }}" class="paper-link {% if request.endpoint == 'main.journal' %}active{% endif %}">
                        <span class="paper-arrow">{% if request.endpoint == 'main.journal' %}→{% else %}&thinsp;{% endif %}</span>Journal
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('main.archive') }}" class="paper-link {% if request.endpoint == 'main.archive' %}active{% endif %}">
                        <span class="paper-arrow">{% if request.endpoint == 'main.archive' %}→{% else %}&thinsp;{% endif %}</span>Archive
                    </a>
                </li>
            </ul>
        </nav>

        <div style="height: 24px;"></div>

        <div class="paper-rule">~·~</div>

        <nav class="paper-footer-nav">
            <ul>
                <li>
                    <button class="paper-link paper-btn" id="sidebar-new-journal-btn">
                        New Entry <span class="paper-shortcut">⌘O</span>
                    </button>
                </li>
            </ul>
        </nav>

    </div>

</aside>

<button class="sidebar-open-btn" id="sidebar-open-btn" title="Open sidebar" aria-label="Open sidebar" style="display: none;">
    <i class="ti ti-layout-sidebar-left-expand"></i>
</button>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="mobile-top-bar" id="mobile-top-bar">
    <button class="mobile-toggle-btn" id="mobile-sidebar-toggle-btn" aria-label="Toggle menu">
        <i class="ti ti-menu-2"></i>
    </button>
    <a href="{{ url_for('main.archive') }}" class="mobile-logo">MoodBlume</a>
    <div style="width: 40px;"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // --- Collapse / Expand ---
    const sidebar = document.getElementById('app-sidebar');
    const closeBtn = document.getElementById('sidebar-close-btn');
    const openBtn = document.getElementById('sidebar-open-btn');

    function collapseSidebar() {
        sidebar.classList.add('collapsed');
        document.body.classList.add('sidebar-collapsed');
        if (openBtn) openBtn.style.display = 'flex';
        localStorage.setItem('sidebarCollapsed', '1');
    }

    function expandSidebar() {
        sidebar.classList.remove('collapsed');
        document.body.classList.remove('sidebar-collapsed');
        if (openBtn) openBtn.style.display = 'none';
        localStorage.setItem('sidebarCollapsed', '0');
    }

    if (localStorage.getItem('sidebarCollapsed') === '1') {
        collapseSidebar();
    }

    if (closeBtn) closeBtn.addEventListener('click', collapseSidebar);
    if (openBtn) openBtn.addEventListener('click', expandSidebar);

    // --- Mobile Sidebar ---
    const overlay = document.getElementById('sidebar-overlay');
    const mobileToggleBtn = document.getElementById('mobile-sidebar-toggle-btn');

    if (mobileToggleBtn) {
        mobileToggleBtn.addEventListener('click', function () {
            sidebar.classList.add('show');
            overlay.classList.add('show');
        });
    }

    if (overlay) {
        overlay.addEventListener('click', function () {
            sidebar.classList.remove('show');
            overlay.classList.remove('show');
        });
    }

    // --- New Entry ---
    const newJournalBtn = document.getElementById('sidebar-new-journal-btn');

    function handleNewJournal() {
        if (window.location.pathname === '/sanctuary') {
            if (typeof startOpenJournal === 'function') {
                startOpenJournal();
            } else {
                window.location.href = '/sanctuary?open_journal=true';
            }
        } else {
            window.location.href = '/sanctuary?open_journal=true';
        }
    }

    if (newJournalBtn) newJournalBtn.addEventListener('click', handleNewJournal);

    document.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'o') {
            e.preventDefault();
            handleNewJournal();
        }
    });

});
</script>
