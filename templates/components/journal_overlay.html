<style>
    /* ─── JOURNAL OVERLAY STYLES ─── */
    #desk-overlay {
      position: fixed;
      inset: 0;
      background: rgba(234, 232, 225, 0.96); /* Light cozy overlay */
      z-index: 10000; /* Set z-index above bottom-dock (9999) to prevent overlay overlaps */
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #desk-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .btn-back-room {
      display: none !important; /* Hide duplicate overlay exit button to prevent overlapping with topbar */
      position: absolute;
      top: 30px;
      left: 30px;
      background: rgba(196, 192, 184, 0.4);
      border: 1px solid rgba(196, 192, 184, 0.6);
      color: #5A544A;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      z-index: 10010; /* Ensure button stays above the iframe */
    }

    .btn-back-room:hover {
      background: rgba(176, 172, 164, 0.8);
      color: #2C2820;
    }

    .embedded-journal-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }

    /* Dark Mode Support for Overlay Background */
    body.dark-theme #desk-overlay {
      background: rgba(28, 16, 8, 0.96); /* Dark espresso tint */
    }
    body.dark-theme .btn-back-room {
      background: rgba(42, 26, 14, 0.6);
      border-color: rgba(246, 243, 238, 0.12);
      color: #d4c9b0;
    }
    body.dark-theme .btn-back-room:hover {
      background: rgba(42, 26, 14, 0.9);
      color: #FFFFFF;
    }
</style>

<div id="desk-overlay">
    <button class="btn-back-room" onclick="backToRoom()">&#8592; return to room</button>
    <iframe class="embedded-journal-iframe" id="embeddedJournalIframe" src="about:blank"></iframe>
</div>

<script>
    // Flag to check if the user did any writing/saves to trigger a reload when closing
    var journalDirty = false;

    // Listen to messages from the iframe to check if entries were saved or if the overlay should close
    window.addEventListener('message', function(event) {
        if (event.data === 'journal_saved') {
            journalDirty = true;
        } else if (event.data === 'close_journal_overlay') {
            backToRoom();
        }
    });

    function backToRoom() {
      document.getElementById('desk-overlay').classList.remove('show');
      var iframe = document.getElementById('embeddedJournalIframe');
      iframe.src = "about:blank"; // Clear iframe source to release resources
      
      // If the user wrote/saved entries, reload the room page to reflect changes
      if (journalDirty) {
          window.location.reload();
      }
    }

    function startOpenJournal() {
      document.getElementById('desk-overlay').classList.add('show');
      var iframe = document.getElementById('embeddedJournalIframe');
      // Pass open=true parameter to trigger the auto-flip open animation on load
      iframe.src = "/journal?embedded=true&open=true";
      journalDirty = false; // Reset dirty state
    }

    // Auto-open logic if redirecting from writing page
    window.addEventListener('load', function() {
        const urlParams = new URLSearchParams(window.location.search);
        var forceOpen = "{{ open_journal }}" === "True" || urlParams.get('open') === 'main.journal' || urlParams.get('open_journal') === 'true';
        if (forceOpen) {
            startOpenJournal();
            
            // Clean the URL so reloading doesn't auto-open again
            if (window.history && window.history.replaceState) {
                window.history.replaceState(null, '', window.location.pathname);
            }
        }
    });
</script>
