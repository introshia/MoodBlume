<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MoodBlume · Sanctuary</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sunshiney&family=Balsamiq+Sans:wght@400;700&family=Lora:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/sanctuary.css">
</head>

<body>
  <canvas id="c"></canvas>

  <!-- ── Window greeting inscription (on the glass) ── -->
  <div id="window-greeting">
    <span class="greeting-text">{{ greeting }}</span>
  </div>

  <!-- ── Desk MoodBlob companion (sits on the desk to the left of the journal) ── -->
  <div id="desk-companion"
    style="--base: {{ companion.color }}; --light: {{ companion.light }}; --dark: {{ companion.dark }}; --speed: 3.2s; --mspeed: 4.5s;">
    <div class="sanctuary-blob-wrap">
      <!-- Streak growth accessory -->
      <div class="blob-accessory streak-stage-{{ streak_stage }}">
        {% if streak_stage == 'sprout' %}
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
            <path d="M12 22 V14 C12 11, 14 9, 17 9" stroke="#6A9040" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M17 9 C18 7, 16 5, 14 5 C11 5, 12 8, 12 9 Z" fill="#8AAA58"/>
          </svg>
        {% elif streak_stage == 'stem' %}
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M12 22 V10 C12 7, 15 5, 18 5" stroke="#6A9040" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M12 16 C9 16, 7 14, 7 12 C7 10, 10 11, 12 13 Z" fill="#8AAA58"/>
            <path d="M18 5 C19 3, 17 2, 15 2 C13 2, 14 5, 14 5 Z" fill="#6A9040"/>
          </svg>
        {% elif streak_stage == 'bud' %}
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M12 22 V12" stroke="#6A9040" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M12 12 C10 10, 10 6, 12 4 C14 6, 14 10, 12 12 Z" fill="#FF9AA2" stroke="#E07828" stroke-width="1"/>
            <path d="M10 12 C8 12, 9 10, 10 9 C11 8, 11 11, 12 12" stroke="#6A9040" stroke-width="1.5" fill="none"/>
          </svg>
        {% elif streak_stage == 'bloom' %}
          <svg viewBox="0 0 32 16" width="34" height="17" fill="none">
            <g transform="translate(4, 2)">
              <circle cx="6" cy="6" r="4" fill="#FFB4D1"/>
              <circle cx="6" cy="6" r="1.5" fill="#FFE380"/>
            </g>
            <g transform="translate(12, 0)">
              <circle cx="6" cy="6" r="5" fill="#FF9AA2"/>
              <circle cx="6" cy="6" r="2" fill="#FFE380"/>
            </g>
            <g transform="translate(20, 2)">
              <circle cx="6" cy="6" r="4" fill="#DBC8F0"/>
              <circle cx="6" cy="6" r="1.5" fill="#FFE380"/>
            </g>
          </svg>
        {% endif %}
      </div>
      <!-- Blob body -->
      <div class="blob-main">
        <div class="blob-body"></div>
        <div class="blob-mini m1"></div>
        <div class="blob-mini m2"></div>
        <div class="blob-face">
          <div class="blob-eyes">
            <div class="blob-eye"></div>
            <div class="blob-eye"></div>
          </div>
          <div class="blob-mouth">
            <svg width="18" height="8" viewBox="0 0 22 10" fill="none" aria-hidden="true">
              <path d="{{ companion.mouth }}" stroke="rgba(0,0,0,0.5)" stroke-width="2" stroke-linecap="round" fill="none" />
            </svg>
          </div>
        </div>
      </div>
      <!-- Floor shadow -->
      <div class="blob-shadow sanctuary-blob-shadow"></div>
    </div>
  </div>

  <nav id="nav">
    <div class="logo" id="logo-btn">MoodBlume</div>
  </nav>

  <div id="bottom-dock" onclick="event.stopPropagation()">
    <a class="dock-link" href="/archive">
      <i class="fa-solid fa-book-bookmark dock-icon"></i>
      <span class="dock-label">Archive</span>
    </a>
    <a class="dock-link" href="/writing">
      <i class="fa-solid fa-pen-nib dock-icon"></i>
      <span class="dock-label">Journal</span>
    </a>
    <a class="dock-link" href="/profile">
      <i class="fa-solid fa-user-gear dock-icon"></i>
      <span class="dock-label">Profile</span>
    </a>
  </div>

  <div id="tip">
    <div class="tt" id="ttt"></div>
    <div class="ts" id="tts"></div>
  </div>

  <div id="modal">
    <div class="m-ov" onclick="closeM()"></div>
    <div class="m-card">
      <button class="m-close" onclick="closeM()">&#x2715;</button>
      <h2 id="m-title"></h2>
      <p id="m-body"></p>
      <div class="m-btn" id="m-enter" onclick="closeM()">Enter &rarr;</div>
    </div>
  </div>

  <button id="lamptgl" onclick="toggleLamp(); event.stopPropagation();">&#9789; lamp</button>
  <div id="sound-ctrl">
    <button class="s-btn" id="btn-music" onclick="toggleMusic()" title="Music">&#9835;</button>
    <button class="s-btn" id="btn-rain" onclick="toggleRain()" title="Rain">&#9748;</button>
  </div>
  <div id="timebadge">a quiet evening in your study</div>
  <div id="weatherbadge"></div>

  <script id="recent-entries-data" type="application/json">
    {{ recent_entries | default([]) | tojson }}
  </script>
  <script src="/static/js/sanctuary.js"></script>

  {% include 'components/journal_overlay.html' %}
</body>

</html>
