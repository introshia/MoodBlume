<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MoodBlume · Sanctuary</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sunshiney&family=Balsamiq+Sans:wght@400;700&family=Lora:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/sanctuary.css?v=20260531">
</head>

<body>
  <canvas id="c"></canvas>

  <nav id="nav">
    <div class="logo" id="logo-btn">MoodBlume</div>
  </nav>

  <div id="bottom-dock" onclick="event.stopPropagation()">
    <a class="dock-link" href="/archive">
      <i class="fa-solid fa-book-bookmark dock-icon"></i>
      <span class="dock-label">Archive</span>
    </a>
    <a class="dock-link" href="/writing">
      <i class="fa-solid fa-pen-nib dock-icon"></i>
      <span class="dock-label">Journal</span>
    </a>
    <a class="dock-link" href="/profile">
      <i class="fa-solid fa-user-gear dock-icon"></i>
      <span class="dock-label">Profile</span>
    </a>
  </div>

  <div id="tip">
    <div class="tt" id="ttt"></div>
    <div class="ts" id="tts"></div>
  </div>

  <div id="modal">
    <div class="m-ov" onclick="closeM()"></div>
    <div class="m-card">
      <button class="m-close" onclick="closeM()">&#x2715;</button>
      <h2 id="m-title"></h2>
      <p id="m-body"></p>
      <div class="m-btn" id="m-enter" onclick="closeM()">Enter &rarr;</div>
    </div>
  </div>

  <div id="sound-ctrl">
    <button class="s-btn" id="btn-music" onclick="toggleMusic()" title="Music">&#9835;</button>
  </div>
  <div id="weatherbadge"></div>

  <script id="recent-entries-data" type="application/json">
    {{ recent_entries | default([]) | tojson }}
  </script>
  <script id="has-journals-data" type="application/json">
    {{ has_journals | default(false) | tojson }}
  </script>
  <script id="active-bg-data" type="application/json">
    {{ active_bg | default('#3D2B1F') | tojson }}
  </script>
  <script id="active-art-data" type="application/json">
    {{ active_art | default('botanical') | tojson }}
  </script>
  <script>
    window.hasJournals = JSON.parse(document.getElementById('has-journals-data').textContent);
    window.activeBg = JSON.parse(document.getElementById('active-bg-data').textContent);
    window.activeArt = JSON.parse(document.getElementById('active-art-data').textContent);
  </script>
  <script src="/static/js/sanctuary.js?v=20260531b"></script>

  {% include 'components/journal_overlay.html' %}
</body>

</html>
