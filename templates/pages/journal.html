{% extends 'pages/base.html' %}
{% block title %}Journal{% endblock %}

{% block head %}
<style>
    :root {
        --bg: #FFF9FD;
        --surface: #FFFFFF;
        --text: #4B2E1F;
        --muted: rgba(75, 46, 31, 0.55);
    }

    body {
        background-color: var(--bg) !important;
    }

    .journal-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 24px 80px;
        min-height: 80vh;
    }

    /* ── 3D Journal Spotlight ── */
    .journal-spotlight-section {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 52px;
    }

    .journal-spotlight {
        margin: 40px 0 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        perspective: 3000px;
        perspective-origin: 50% 10px;
    }

    .journal-spotlight .journal {
        position: relative;
        width: 612px;
        height: 420px;
        transform-style: preserve-3d;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(-153px) rotateX(2deg);
    }

    .journal-spotlight .journal::before {
        content: '';
        position: absolute;
        left: 306px;
        top: 25px;
        bottom: 25px;
        width: 1px;
        background: rgba(0, 0, 0, 0.15);
        z-index: 20;
        transform: translateZ(5px);
        opacity: 0;
        transition: opacity 0.1s ease 1s;
    }

    .journal-spotlight .journal.spread-open::before {
        opacity: 1;
        transition: opacity 0.3s ease 0s;
    }

    .journal-spotlight .journal.spread-open {
        transform: rotateX(10deg);
    }

    .journal-spotlight .wing {
        position: absolute;
        top: 0;
        width: 306px;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    .journal-spotlight .left-half {
        position: absolute;
        top: 0;
        left: 0;
        width: 306px;
        height: 100%;
        transform-origin: right center;
        transform: rotateY(180deg) translateZ(-0.5px);
        z-index: 1;
        background: #3D2B1F;
        border-radius: 35px 0 0 35px;
    }

    .journal-spotlight .left-half.wing-open {
        transform: rotateY(0deg) translateZ(-0.5px);
        cursor: pointer;
    }

    .journal-spotlight .cover-inside {
        position: absolute;
        top: 10px;
        bottom: 10px;
        background: #f4eee0;
        z-index: 1;
        transform: translateZ(0.1px);
        transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    .journal-spotlight .left-half .cover-inside {
        left: 8px;
        right: 0;
        border-radius: 28px 0 0 28px;
    }

    .journal-spotlight .front-cover-design {
        position: absolute;
        inset: 0;
        background: linear-gradient(to right,
                rgba(0, 0, 0, 0.3) 0%,
                rgba(255, 255, 255, 0.05) 2%,
                transparent 5%,
                rgba(0, 0, 0, 0.2) 6%,
                rgba(0, 0, 0, 0.4) 7%,
                transparent 9%), #3D2B1F;
        border-radius: 0 35px 35px 0;
        box-shadow: 15px 0 35px rgba(0, 0, 0, 0.4);
        transform: rotateY(180deg);
        backface-visibility: hidden;
        z-index: 2;
        overflow: hidden;
    }

    .journal-spotlight .elastic {
        position: absolute;
        right: 22px;
        top: 4px;
        bottom: 4px;
        width: 9px;
        background: linear-gradient(to right, #0a0a0a, #1c1c1c 50%, #0a0a0a);
        border-radius: 3px;
        z-index: 3;
    }

    .journal-spotlight .cover-label {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        text-align: center;
        z-index: 20;
        pointer-events: none;
    }

    .journal-spotlight .right-wing {
        position: absolute;
        top: 0;
        left: 306px;
        width: 306px;
        height: 100%;
        transform-origin: left center;
        transform: rotateY(0deg) translateZ(-0.5px);
        z-index: 1;
        transform-style: preserve-3d;
        background: #3D2B1F;
        border-radius: 0 35px 35px 0;
        box-shadow: -1px 0 0 #3D2B1F;
        transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    .journal-spotlight .right-wing.wing-open {
        transform: rotateY(0deg) translateZ(-0.5px);
        cursor: pointer;
        z-index: 100;
    }

    .journal-spotlight .wing.wing-open .cover-inside {
        transform: translateZ(0.1px);
        cursor: pointer;
    }

    .journal-spotlight .back-cover-design {
        position: absolute;
        inset: 0;
        background: #3D2B1F;
        border-radius: 0 35px 35px 0;
        backface-visibility: hidden;
        z-index: 1;
    }

    .journal-spotlight .right-wing .cover-inside {
        position: absolute;
        top: 10px;
        bottom: 10px;
        left: 0;
        right: 8px;
        border-radius: 0 28px 28px 0;
        backface-visibility: hidden;
        z-index: 2;
    }

    .journal-spotlight .page {
        position: absolute;
        left: 306px;
        top: 0;
        width: 306px;
        height: 100%;
        transform-origin: left center;
        transform-style: preserve-3d;
        transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
        cursor: pointer;
        user-select: none;
        overflow: visible;
        pointer-events: none;
    }

    .journal-spotlight .page-front,
    .journal-spotlight .page-back {
        pointer-events: auto;
    }

    .journal-spotlight .page.flipped {
        transform: rotateY(-180deg);
    }

    .journal-spotlight .page-front,
    .journal-spotlight .page-back {
        position: absolute;
        top: 11px;
        bottom: 12px;
        background-color: #fdfaf3;
        backface-visibility: hidden;
        box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.02);
        overflow: hidden;
        padding-left: 10px;
        padding-right: 10px;
    }

    .journal-spotlight .right-wing .cover-inside {
        padding-left: 10px;
    }

    .journal-spotlight .left-half .cover-inside {
        padding-right: 10px;
    }

    .journal-spotlight .cover-inside {
        background-color: #f4eee0;
    }

    .journal-spotlight .page-front {
        left: 0;
        width: 294px;
        border-radius: 0 28px 28px 0;
        z-index: 2;
    }

    .journal-spotlight .page-back {
        left: 0;
        width: 294px;
        border-radius: 28px 0 0 28px;
        transform: rotateY(180deg);
        z-index: 1;
    }

    .journal-spotlight .spine-shadow {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 40px;
        pointer-events: none;
        z-index: 10;
        display: block !important;
    }

    .journal-spotlight .page-front .spine-shadow,
    .journal-spotlight .right-wing .cover-inside .spine-shadow {
        left: 0;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.12) 0%, transparent 100%);
    }

    .journal-spotlight .page-back .spine-shadow,
    .journal-spotlight .left-half .cover-inside .spine-shadow {
        right: 0;
        left: auto;
        background: linear-gradient(to left, rgba(0, 0, 0, 0.12) 0%, transparent 100%);
    }

    .journal-spotlight .page:not(.active-page) .page-front::after,
    .journal-spotlight .page:not(.active-page) .page-back::after {
        display: none !important;
    }

    .journal-spotlight .page-front,
    .journal-spotlight .page-back {
        background-origin: content-box;
    }

    .journal-spotlight .style-lined {
        background-image:
            repeating-linear-gradient(transparent, transparent 31px, rgba(150, 128, 96, 0.18) 31px, rgba(150, 128, 96, 0.18) 32px),
            linear-gradient(#fdfaf3, #fdfaf3);
        background-size: 100% 32px, 100% 100%;
        background-position: 0 0, 0 0;
        background-origin: content-box, padding-box;
        background-clip: content-box, padding-box;
    }

    .journal-spotlight .style-grid {
        background-image:
            linear-gradient(to right, rgba(150, 128, 96, 0.15) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(150, 128, 96, 0.15) 1px, transparent 1px),
            linear-gradient(#fdfaf3, #fdfaf3);
        background-size: 24px 24px, 24px 24px, 100% 100%;
        background-origin: content-box, content-box, padding-box;
        background-clip: content-box, content-box, padding-box;
    }

    .journal-spotlight .style-grid .page-writing-area,
    .journal-spotlight .style-grid .page-writing-placeholder {
        line-height: 24px;
    }

    .journal-spotlight .page.style-blank,
    .journal-spotlight .page-front.style-blank,
    .journal-spotlight .page-back.style-blank {
        background-image: none !important;
    }

    .journal-spotlight .lbl-small {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 300;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 1px;
        margin-bottom: 4px;
        display: block;
    }

    .journal-spotlight .lbl-big {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 32px;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1;
        display: block;
    }

    .btn-journal {
        background: #3D2B1F;
        color: #fdfaf3;
        border: none;
        padding: 12px 30px;
        border-radius: 30px;
        font-family: 'Balsamiq Sans', cursive;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-journal:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        opacity: 0.9;
    }

    .picker-wrap-3d {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-top: 24px;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.4s ease;
        pointer-events: none;
    }

    .picker-wrap-3d.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: all;
    }

    /* Writing areas */
    .journal-spotlight .page-writing-area {
        position: absolute;
        inset: 0;
        line-height: 32px;
        background: transparent;
        outline: none;
        border: none;
        font-family: 'Cormorant Garamond', serif;
        font-size: 15px;
        color: #3D2820;
        cursor: text;
        user-select: text;
        -webkit-user-select: text;
        overflow: hidden;
        z-index: 5;
        white-space: pre-wrap;
        word-break: break-word;
        caret-color: rgba(150, 128, 96, 0.9);
    }

    .journal-spotlight .page-front .page-writing-area {
        padding: 4px 22px 16px 38px;
    }

    .journal-spotlight .page-back .page-writing-area {
        padding: 4px 38px 16px 22px;
    }

    .journal-spotlight .page-writing-placeholder {
        position: absolute;
        top: 4px;
        font-family: 'Cormorant Garamond', serif;
        font-size: 15px;
        font-style: italic;
        line-height: 32px;
        color: rgba(150, 128, 96, 0.35);
        pointer-events: none;
        z-index: 4;
    }

    .journal-spotlight .page-flip-strip {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 30px;
        z-index: 10;
        background: transparent;
        cursor: pointer;
    }

    @media (max-width: 680px) {
        .journal-spotlight-section {
            padding: 0 16px;
        }

        .journal-spotlight .journal {
            transform: scale(0.7) translateX(-110px) rotateX(2deg);
            transform-origin: top center;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="journal-page">
    <div class="journal-spotlight-section">
        <div class="journal-spotlight">
            <div class="scene">
                <div class="journal" id="journal3d">
                    <!-- COVERS -->
                    <div class="wing left-half" id="leftHalf">
                        <div class="cover-inside">
                            <div class="spine-shadow"></div>
                        </div>
                        <div class="front-cover-design">
                            <div class="elastic"></div>
                            <div class="cover-label">
                                <div class="lbl-small">a memory from</div>
                                <div class="lbl-big" id="cover-date">
                                    {% if latest_entry %}
                                        {{ latest_entry.entry_date.strftime('%b %d') }}
                                    {% else %}
                                        today
                                    {% endif %}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="wing right-wing" id="rightWing">
                        <div class="back-cover-design"></div>
                        <div class="cover-inside">
                            <div class="spine-shadow"></div>
                        </div>
                    </div>

                    <!-- STACKED PAGES (5) -->
                    <div class="page" style="z-index: 10;" data-page="1">
                        <div class="page-front style-lined"><div class="spine-shadow"></div></div>
                        <div class="page-back style-lined"><div class="spine-shadow"></div></div>
                    </div>
                    <div class="page" style="z-index: 9;" data-page="2">
                        <div class="page-front style-lined"><div class="spine-shadow"></div></div>
                        <div class="page-back style-lined"><div class="spine-shadow"></div></div>
                    </div>
                    <div class="page" style="z-index: 8;" data-page="3">
                        <div class="page-front style-lined"><div class="spine-shadow"></div></div>
                        <div class="page-back style-lined"><div class="spine-shadow"></div></div>
                    </div>
                    <div class="page" style="z-index: 7;" data-page="4">
                        <div class="page-front style-lined"><div class="spine-shadow"></div></div>
                        <div class="page-back style-lined"><div class="spine-shadow"></div></div>
                    </div>
                    <div class="page" style="z-index: 6;" data-page="5">
                        <div class="page-front style-lined"><div class="spine-shadow"></div></div>
                        <div class="page-back style-lined"><div class="spine-shadow"></div></div>
                    </div>
                </div>
            </div>
            <div class="journal-controls" style="margin-top: 40px; text-align: center;">
                <button class="btn-journal" onclick="toggleJournal3D()" id="btn-journal-toggle">Open Journal</button>
            </div>
            <div class="picker-wrap-3d" id="pickerWrap3D">
                <div class="picker-label" style="font-family:'Balsamiq Sans',cursive; font-size:10px; color:rgba(0,0,0,0.3); text-transform:uppercase; letter-spacing:2px; margin-bottom:8px;">page style</div>
                <div class="style-picker" style="display:flex; background:white; border:1px solid rgba(0,0,0,0.1); border-radius:50px; overflow:hidden;">
                    <button class="style-btn" onclick="setStyle3D('lined')" style="padding:8px 20px; border:none; background:transparent; font-family:'Balsamiq Sans',cursive; font-size:12px; cursor:pointer; border-right:1px solid rgba(0,0,0,0.1);">lined</button>
                    <button class="style-btn" onclick="setStyle3D('grid')" style="padding:8px 20px; border:none; background:transparent; font-family:'Balsamiq Sans',cursive; font-size:12px; cursor:pointer; border-right:1px solid rgba(0,0,0,0.1);">grid</button>
                    <button class="style-btn" onclick="setStyle3D('blank')" style="padding:8px 20px; border:none; background:transparent; font-family:'Balsamiq Sans',cursive; font-size:12px; cursor:pointer;">blank</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let isOpen3D = false;
    let isAnimating3D = false;
    const journal3d = document.getElementById('journal3d');
    const leftHalf3d = document.getElementById('leftHalf');
    const rightWing3d = document.getElementById('rightWing');
    const btnToggle3d = document.getElementById('btn-journal-toggle');
    const pickerWrap3d = document.getElementById('pickerWrap3D');
    const allPages = document.querySelectorAll('.journal-spotlight .page');

    const OPEN_DUR = 1200;

    window.toggleJournal3D = function () {
        if (isAnimating3D) return;
        isAnimating3D = true;
        isOpen3D = !isOpen3D;

        if (isOpen3D) {
            journal3d.classList.add('spread-open');
            leftHalf3d.classList.add('wing-open');
            rightWing3d.classList.add('wing-open');
            if (btnToggle3d) btnToggle3d.textContent = 'Close Journal';
            setTimeout(() => { isAnimating3D = false; pickerWrap3d.classList.add('visible'); }, OPEN_DUR);
        } else {
            pickerWrap3d.classList.remove('visible');
            let delay = 0;
            const flippedPages = Array.from(allPages).filter(p => p.classList.contains('flipped')).reverse();
            flippedPages.forEach((p, i) => {
                setTimeout(() => p.classList.remove('flipped'), i * 150);
                delay = Math.max(delay, (i * 150) + 600);
            });
            setTimeout(() => {
                leftHalf3d.classList.remove('wing-open');
                rightWing3d.classList.remove('wing-open');
                setTimeout(() => {
                    journal3d.classList.remove('spread-open');
                    if (btnToggle3d) btnToggle3d.textContent = 'Open Journal';
                    isAnimating3D = false;
                    updateZIndices();
                }, 800);
            }, delay);
        }
    };

    function updateZIndices() {
        const flipped = Array.from(allPages).filter(p => p.classList.contains('flipped'));
        const lastFlipped = flipped[flipped.length - 1];
        const nextToFlip = Array.from(allPages).find(p => !p.classList.contains('flipped'));
        allPages.forEach((page, index) => {
            const isFlipped = page.classList.contains('flipped');
            page.style.zIndex = isFlipped ? 10 + index : 10 - index;
            if (page === lastFlipped || page === nextToFlip) {
                page.classList.add('active-page');
            } else {
                page.classList.remove('active-page');
            }
        });
    }

    window.setStyle3D = function (style) {
        const allPotential = document.querySelectorAll('.journal-spotlight .page, .journal-spotlight .page-front, .journal-spotlight .page-back, .journal-spotlight .wing, .journal-spotlight .cover-inside');
        allPotential.forEach(el => el.classList.remove('style-grid', 'style-blank', 'style-lined'));
        const faces = document.querySelectorAll('.journal-spotlight .page-front, .journal-spotlight .page-back');
        faces.forEach(el => el.classList.add('style-' + style));
    };

    window.addEventListener('load', () => {
        updateZIndices();

        allPages.forEach((page) => {
            page.addEventListener('click', (e) => { e.stopPropagation(); });
        });

        journal3d?.addEventListener('click', (e) => {
            if (!isOpen3D && !isAnimating3D) toggleJournal3D();
        });

        document.addEventListener('click', (e) => {
            if (isOpen3D && !isAnimating3D) {
                const isCoverInside = e.target.closest('.cover-inside');
                const isWing = e.target.closest('.wing');
                const isScene = e.target.closest('.scene');
                const isPage = e.target.closest('.page');
                const isControls = e.target.closest('.journal-controls');
                const isWritingArea = e.target.closest('.page-writing-area');
                if ((isCoverInside || isWing || isScene) && !isPage && !isControls && !isWritingArea) {
                    toggleJournal3D();
                }
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isOpen3D && !isAnimating3D) toggleJournal3D();
        });
    });

    // --- Journal Writing Areas ---
    (function initWritingAreas() {
        function addWritingArea(el, id, placeholderText, isBack) {
            const ph = document.createElement('div');
            ph.className = 'page-writing-placeholder';
            ph.textContent = placeholderText;
            ph.style.left = isBack ? '22px' : '38px';

            const area = document.createElement('div');
            area.className = 'page-writing-area';
            area.contentEditable = 'true';
            area.spellcheck = false;
            area.dataset.pageId = id;

            const saved = localStorage.getItem('journal-page-' + id);
            if (saved) area.innerHTML = saved;

            const isEmpty = () => area.textContent.trim() === '';
            const syncPh = () => { ph.style.display = isEmpty() ? '' : 'none'; };
            area.addEventListener('input', () => {
                syncPh();
                localStorage.setItem('journal-page-' + id, area.innerHTML);
            });
            syncPh();

            el.appendChild(ph);
            el.appendChild(area);
            return { area, ph, isEmpty };
        }

        document.querySelectorAll('.journal-spotlight .page').forEach((page, i) => {
            const pageNum = i + 1;
            const front = page.querySelector('.page-front');
            const back  = page.querySelector('.page-back');

            const { area: frontArea, ph: frontPh, isEmpty: frontEmpty } = addWritingArea(
                front, 'p' + pageNum + '-front',
                pageNum === 1 ? 'begin here...' : 'write freely...', false);
            const { area: backArea, ph: backPh, isEmpty: backEmpty } = addWritingArea(
                back, 'p' + pageNum + '-back', 'write freely...', true);

            const initFlipped = page.classList.contains('flipped');
            front.style.pointerEvents = initFlipped ? 'none' : 'auto';
            back.style.pointerEvents  = initFlipped ? 'auto' : 'none';

            backArea.style.display = 'none';
            backPh.style.display   = 'none';

            new MutationObserver(() => {
                const flipped = page.classList.contains('flipped');
                front.style.pointerEvents = flipped ? 'none' : 'auto';
                back.style.pointerEvents  = flipped ? 'auto' : 'none';

                frontArea.style.display = flipped ? 'none' : '';
                frontPh.style.display   = flipped ? 'none' : (frontEmpty() ? '' : 'none');
                backArea.style.display  = flipped ? ''     : 'none';
                backPh.style.display    = flipped ? (backEmpty() ? '' : 'none') : 'none';
            }).observe(page, { attributes: true, attributeFilter: ['class'] });

            const frontStrip = document.createElement('div');
            frontStrip.className = 'page-flip-strip';
            frontStrip.style.right = '0';
            front.appendChild(frontStrip);

            const backStrip = document.createElement('div');
            backStrip.className = 'page-flip-strip';
            backStrip.style.left = '0';
            back.appendChild(backStrip);

            frontStrip.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isOpen3D || isAnimating3D) return;
                if (!page.classList.contains('flipped')) {
                    const nextToFlip = Array.from(allPages).find(p => !p.classList.contains('flipped'));
                    if (page === nextToFlip) {
                        page.classList.add('flipped');
                        updateZIndices();
                    }
                }
            });

            backStrip.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isOpen3D || isAnimating3D) return;
                if (page.classList.contains('flipped')) {
                    const flipped = Array.from(allPages).filter(p => p.classList.contains('flipped'));
                    if (page === flipped[flipped.length - 1]) {
                        page.classList.remove('flipped');
                        updateZIndices();
                    }
                }
            });
        });
    })();
</script>
{% endblock %}
