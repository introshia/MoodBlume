{% extends 'pages/base.html' %}


{% block title %}404 Page Not Found{% endblock %}

{% block content %}
<section id="error-404" class="content-section" style="padding: 120px 40px; text-align: center;">
    <div class="error-content">
        <h1 class="error-code">404</h1>
        <h2 class="error-headline">Looks like you wandered off the path.</h2>
        <p class="error-subtext">
            Don't worry, every journey has a few detours. <br>
            Let's get you back to blooming.
        </p>
        <a href="{{ url_for('index') }}" class="cta-button">Back to Home</a>
    </div>
</section>
{% endblock %}
